<!DOCTYPE html>
<html>
<head>
    <title>NeuroPulse - EEG Stress Platform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin:0; font-family:'Segoe UI'; background:#0c1117; color:white; text-align:center; }
        header { background:#111827; padding:25px; border-bottom:1px solid #333; }
        button { background:linear-gradient(135deg,#00b4ff,#0066ff); border:none; color:white; padding:12px 20px; margin:10px; border-radius:8px; cursor:pointer; font-weight:600; }
        button:hover { transform:scale(1.05); box-shadow:0 0 15px #00b4ff; }
        section { width:85%; margin:20px auto; background:#161b22; padding:25px; border-radius:14px; box-shadow:0 0 30px rgba(0,0,0,0.6); }
        #brainContainer { width:700px; height:400px; margin:auto; box-shadow:0 0 50px rgba(0,140,255,0.4); }
        canvas { max-width:700px; margin:auto; display:block; }
        .bands { display:flex; justify-content:center; gap:40px; font-size:18px; }
        #console { background:black; color:#00ff9c; height:180px; overflow-y:auto; padding:15px; font-family:monospace; border-radius:8px; }
    </style>
</head>
<body>

<header>
    <h1>NeuroPulse</h1>
    <p>EEG Stress Analysis Platform</p>
    <button onclick="startLive()">Start Live Scan</button>
    <button onclick="replayDataset()">Replay Dataset</button>
    <button onclick="generateReport()">Generate Report</button>
</header>

<section>
    <h2>3D Brain Visualization</h2>
    <div id="brainContainer"></div>
</section>

<section>
    <h2>Multi Channel EEG</h2>
    <canvas id="eegChart"></canvas>
</section>

<section>
    <h2>Band Distribution</h2>
    <canvas id="bandChart"></canvas>
</section>

<section>
    <h2>Band Power</h2>
    <div class="bands">
        <div>Delta: <span id="delta">0</span></div>
        <div>Theta: <span id="theta">0</span></div>
        <div>Alpha: <span id="alpha">0</span></div>
        <div>Beta: <span id="beta">0</span></div>
        <div>Gamma: <span id="gamma">0</span></div>
    </div>
</section>

<section>
    <h2 id="stress">Stress: 0%</h2>
</section>

<section>
    <h3>System Console</h3>
    <div id="console"></div>
</section>

<script>
// ======== CONSOLE ========
function log(msg) {
    let c = document.getElementById('console');
    let t = new Date().toLocaleTimeString();
    let d = document.createElement('div');
    d.textContent = t + ' ' + msg;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

// ======== 3D BRAIN ========
let scene, camera, renderer, brain, regions = [];

function initBrain() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, 700/400, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(700, 400);
    document.getElementById('brainContainer').appendChild(renderer.domElement);
    
    let light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    camera.position.z = 3;
    
    // Simple sphere brain model
    let geometry = new THREE.SphereGeometry(1, 32, 32);
    let material = new THREE.MeshPhongMaterial({color: 0x4488ff, wireframe: false});
    brain = new THREE.Mesh(geometry, material);
    scene.add(brain);
    
    // Region markers
    let markerGeo = new THREE.SphereGeometry(0.15, 16, 16);
    let prefrontal = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0x0000ff}));
    prefrontal.position.set(0, 0.4, 0.8);
    let motor = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0x0000ff}));
    motor.position.set(-0.4, 0.1, 0);
    let temporal = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0x0000ff}));
    temporal.position.set(0.6, -0.1, 0);
    let occipital = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({color: 0x0000ff}));
    occipital.position.set(0, -0.2, -0.6);
    
    regions = [prefrontal, motor, temporal, occipital];
    regions.forEach(r => brain.add(r));
    
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(brain) brain.rotation.y += 0.005;
    renderer.render(scene, camera);
}

function updateBrainHeat(stress) {
    regions.forEach(r => {
        let color;
        if(stress < 0.4) color = new THREE.Color(0, 0.6, 1);
        else if(stress < 0.65) color = new THREE.Color(1, 0.6, 0);
        else color = new THREE.Color(1, 0, 0);
        r.material.color = color;
    });
}

// ======== EEG GRAPH ========
let ctx = document.getElementById('eegChart').getContext('2d');
let eeg1 = new Array(40).fill(0);
let eeg2 = new Array(40).fill(0);
let eeg3 = new Array(40).fill(0);
let eeg4 = new Array(40).fill(0);

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: eeg1.map((_, i) => i),
        datasets: [
            {data: eeg1, borderColor: '#00ffff', borderWidth: 2, fill: false},
            {data: eeg2, borderColor: '#ff00ff', borderWidth: 2, fill: false},
            {data: eeg3, borderColor: '#00ff88', borderWidth: 2, fill: false},
            {data: eeg4, borderColor: '#ffaa00', borderWidth: 2, fill: false}
        ]
    },
    options: {animation: false, legend: {display: false}}
});

// ======== BAND CHART ========
let bandCtx = document.getElementById('bandChart').getContext('2d');
let bandChart = new Chart(bandCtx, {
    type: 'pie',
    data: {
        labels: ['Delta', 'Theta', 'Alpha', 'Beta', 'Gamma'],
        datasets: [{data: [0,0,0,0,0], backgroundColor: ['#4c6ef5', '#845ef7', '#22b8cf', '#fab005', '#ff6b6b']}]
    }
});

// ======== EEG PROCESSING ========
function processEEG(alpha, beta, theta, delta, gamma) {
    document.getElementById('alpha').innerText = alpha;
    document.getElementById('beta').innerText = beta;
    document.getElementById('theta').innerText = theta;
    document.getElementById('delta').innerText = delta;
    document.getElementById('gamma').innerText = gamma;
    
    let stress = beta / (alpha + beta);
    document.getElementById('stress').innerText = 'Stress: ' + (stress * 100).toFixed(1) + '%';
    updateBrainHeat(stress);
    
    bandChart.data.datasets[0].data = [delta, theta, alpha, beta, gamma];
    bandChart.update();
}

// ======== LIVE MODE (SLOWER SPEED) ========
function startLive() {
    log('EEG acquisition started');
    setInterval(function() {
        eeg1.push((Math.random() - 0.5) * 100);
        eeg2.push((Math.random() - 0.5) * 100);
        eeg3.push((Math.random() - 0.5) * 100);
        eeg4.push((Math.random() - 0.5) * 100);
        eeg1.shift();
        eeg2.shift();
        eeg3.shift();
        eeg4.shift();
        chart.update();
        
        let alpha = 40 + Math.random() * 40;
        let beta = 20 + Math.random() * 80;
        processEEG(alpha, beta, 30, 25, 10);
    }, 1500); // SLOWER: Changed from 700ms to 1500ms (1.5 seconds)
}

// ======== DATASET REPLAY ========
function replayDataset() {
    log('Loading dataset...');
    fetch('data/eegdataset.csv')
        .then(r => r.text())
        .then(t => {
            let rows = t.split('\n').slice(1);
            let i = 0;
            let timer = setInterval(function() {
                if(i >= rows.length) {
                    clearInterval(timer);
                    return;
                }
                let c = rows[i].split(',');
                processEEG(c[3], c[4], c[2], c[1], c[5]);
                i++;
            }, 800);
        });
}

// ======== REPORT ========
function generateReport() {
    let alpha = document.getElementById('alpha').innerText;
    let beta = document.getElementById('beta').innerText;
    let stress = beta / (alpha + beta);
    
    let status, advice;
    if(stress < 0.4) {
        status = 'RELAXED';
        advice = 'Your brain activity suggests a calm mental state. Keep maintaining healthy routines.';
    } else if(stress < 0.65) {
        status = 'MODERATE STRESS';
        advice = 'Cognitive load detected. Consider short breaks or breathing exercises.';
    } else {
        status = 'HIGH STRESS';
        advice = 'High beta activity detected. Relaxation techniques such as meditation are recommended.';
    }
    
    let report = `NEUROPULSE EEG REPORT\n\nAlpha: ${alpha}\nBeta: ${beta}\nStress: ${(stress*100).toFixed(1)}%\n\nStatus: ${status}\n\n${advice}`;
    
    let blob = new Blob([report], {type: 'text/plain'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'EEG_Report.txt';
    a.click();
}

initBrain();
</script>

</body>
</html>
